syntax = "proto3";

package im.redpanda.proto;

option java_package = "im.redpanda.proto";
option java_multiple_files = true;

message KademliaIdProto {
    bytes key_bytes = 1; // 20 bytes
}

message NodeIdProto {
    bytes public_key_bytes = 1; // 65 bytes
}

message PeerInfoProto {
    string ip = 1;
    int32 port = 2;
    NodeIdProto node_id = 3; // optional if not known
    // MS04: 32-byte X25519 encryption public key of the node, so clients can pick
    // garlic hops without importing the full 64-byte node_id export (it duplicates
    // bytes 32..63 of node_id and is only set when node_id is known).
    bytes encryption_public_key = 4;
}

message SendPeerList {
    repeated PeerInfoProto peers = 1;
}

message Ping {
}

message Pong {
}

message RequestPeerList {
}

message KademliaGet {
    int32 job_id = 1;
    KademliaIdProto searched_id = 2;
}

message KademliaGetAnswer {
    int32 ack_id = 1;
    int64 timestamp = 2;
    bytes public_key = 3;
    bytes content = 4;
    bytes signature = 5;
}

message KademliaStore {
    int32 job_id = 1;
    int64 timestamp = 2;
    bytes public_key = 3;
    bytes content = 4;
    bytes signature = 5;
}

message JobAck {
    int32 job_id = 1;
}

message FlaschenpostPut {
    bytes content = 1;
    bytes oh_id = 2;    // 20 bytes — target OH mailbox KademliaId
    // MS02b: if set by a directly connected light client, the node answers with
    // FlaschenpostPutResponse (command 158). Full nodes never set this.
    bool want_response = 3;
    // MS02b: number of node-to-node forwards this packet has taken. Incremented on every
    // forward; packets at the hop limit are dropped instead of forwarded (loop protection).
    uint32 hop_count = 4;
    // MS05: 16-byte reverse-garlic session tag, preserved when the final garlic hop is not the
    // OH host and the deliver falls back to this MS02b forwarding. Empty (unset) for direct
    // deposits and untagged delivers; the host node stores it on the MailItem.
    bytes session_tag = 5;
}

// Unified envelope for future-proofing or batching, 
// though we currently use a 1-byte header for dispatch.
message PandaMessage {
    oneof content {
        Ping ping = 1;
        Pong pong = 2;
        RequestPeerList request_peer_list = 3;
        SendPeerList send_peer_list = 4;
        KademliaGet kademlia_get = 5;
        KademliaGetAnswer kademlia_get_answer = 6;
        KademliaStore kademlia_store = 7;
        JobAck job_ack = 8;
        FlaschenpostPut flaschenpost_put = 9;
    }
}
